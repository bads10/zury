name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: zury
          POSTGRES_PASSWORD: zury
          POSTGRES_DB: zury
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zury"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run Alembic migrations against Postgres
        env:
          DATABASE_URL: postgresql://zury:zury@localhost:5432/zury
        run: alembic upgrade head

      - name: Run pytest (sqlite via conftest)
        run: pytest api/tests/ -v

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t zury-api:ci .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t zury-worker:ci .
