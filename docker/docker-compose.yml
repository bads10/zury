services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: zury
      POSTGRES_USER: zury
      POSTGRES_PASSWORD: zury
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zury"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://zury:zury@postgres:5432/zury
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - uploads_data:/app/uploads

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://zury:zury@postgres:5432/zury
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      TRYON_MODEL: ${TRYON_MODEL:-nano-banana}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  media_data:
  uploads_data:
