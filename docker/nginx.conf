# zury.africa — PWA acheteur
server {
    listen 80;
    server_name zury.africa www.zury.africa;

    root /root/zury/pwa;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Images et fonts — immutables (contenu hashé)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JS et CSS — revalidation courte (on met à jour sans hash)
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}

# api.zury.africa — FastAPI backend (Docker :8000)
server {
    listen 80;
    server_name api.zury.africa;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# dashboard.zury.africa — React admin vendeur
server {
    listen 80;
    server_name dashboard.zury.africa;

    root /root/zury/dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(png|jpg|jpeg|ico|woff2|woff|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}
